<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Task Master | Project</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <nav>
        <a href="index.html" class="logo">DevPortfolio</a>
        <div class="nav-links">
            <a href="index.html">Home</a>
            <a href="projects.html">Back to Projects</a>
        </div>
    </nav>

    <main>
        <div class="todo-container glass-card">
            <h1 class="section-title" style="font-size: 2rem;">Task <span>Master</span></h1>
            
            <form id="todoForm" class="todo-input-group">
                <input type="text" id="todoInput" class="form-control" placeholder="Add a new task..." required>
                <button type="submit" class="btn btn-primary">Add</button>
            </form>
            
            <ul id="todoList" class="todo-list">
                <!-- Tasks will be rendered here dynamically -->
            </ul>
            
            <div id="emptyState" class="empty-state">
                No tasks yet. Add one above!
            </div>
        </div>
    </main>

    <script src="todo.js"></script>
</body>
</html>
